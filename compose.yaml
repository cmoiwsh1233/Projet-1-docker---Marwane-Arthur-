version: "3.9"

services:
  gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - ecommerce-network
    depends_on:
      users-service:
        condition: service_healthy
      products-service:
        condition: service_healthy
      orders-service:
        condition: service_healthy

  users-service:
    build: ./users-service
    restart: unless-stopped
    expose:
      - "5001"
    networks:
      - ecommerce-network
      - users-db-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres-users:
        condition: service_healthy

  products-service:
    build: ./products-service
    restart: unless-stopped
    expose:
      - "5002"
    networks:
      - ecommerce-network
      - products-db-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5002/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres-products:
        condition: service_healthy

  orders-service:
    build: ./orders-service
    restart: unless-stopped
    expose:
      - "5003"
    networks:
      - ecommerce-network
      - orders-db-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5003/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres-orders:
        condition: service_healthy

  postgres-users:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_USERS_DB}
      POSTGRES_USER: ${POSTGRES_USERS_USER}
      POSTGRES_PASSWORD: ${POSTGRES_USERS_PASSWORD}
    volumes:
      - users-data:/var/lib/postgresql/data
    networks:
      - users-db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-products:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_PRODUCTS_DB}
      POSTGRES_USER: ${POSTGRES_PRODUCTS_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PRODUCTS_PASSWORD}
    volumes:
      - products-data:/var/lib/postgresql/data
    networks:
      - products-db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-orders:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_ORDERS_DB}
      POSTGRES_USER: ${POSTGRES_ORDERS_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ORDERS_PASSWORD}
    volumes:
      - orders-data:/var/lib/postgresql/data
    networks:
      - orders-db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  ecommerce-network:
  users-db-network:
  products-db-network:
  orders-db-network:

volumes:
  users-data:
  products-data:
  orders-data:
